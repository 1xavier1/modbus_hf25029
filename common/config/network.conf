# Network Configuration for HF25029-CDP Modbus Slave
# Format: key=value

# IP Address (default: 10.0.0.5)
ip_addr=10.0.0.5

# Subnet Mask (default: 255.255.255.0)
netmask=255.255.255.0

# Modbus Slave Address (default: 1)
slave_addr=1

# Baudrate code: 0=1200, 1=2400, 2=4800, 3=9600, 4=19200, 5=38400, 6=115200 (default: 6)
baudrate=6
